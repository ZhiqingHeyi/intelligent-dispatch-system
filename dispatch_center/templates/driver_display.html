<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆调度指引屏</title>
    <link rel="stylesheet" href="/static/css/driver-display.css">
</head>
<body>
    <div class="driver-screen">
        <!-- 顶部标题区 -->
        <header class="screen-header">
            <div class="header-icon">🚛</div>
            <h1 class="header-title">车辆调度指引</h1>
            <div class="header-subtitle">DRIVER DISPATCH GUIDE</div>
        </header>

        <!-- 主内容区 - 匹配列表 -->
        <main class="screen-main" id="matchContainer">
            <!-- 匹配卡片将通过JS动态生成 -->
            <div class="loading-state" id="loadingState">
                <div class="loading-spinner"></div>
                <p>正在获取调度数据...</p>
            </div>
        </main>

        <!-- 空状态提示 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">⏳</div>
            <h2 class="empty-title">暂无匹配任务</h2>
            <p class="empty-desc">系统正在实时监测，请稍候...</p>
        </div>

        <!-- 底部状态栏 -->
        <footer class="screen-footer">
            <div class="footer-left">
                <span class="status-dot online"></span>
                <span class="status-text">系统运行中</span>
            </div>
            <div class="footer-center">
                <span class="current-time" id="currentTime">--:--:--</span>
            </div>
            <div class="footer-right">
                <span class="update-info" id="updateInfo">数据更新中...</span>
            </div>
        </footer>
    </div>

    <script src="/static/js/driver-display.js"></script>
</body>
</html>
