<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能调度指引</title>
    <link rel="stylesheet" href="/static/css/driver-display.css">
</head>
<body>
    <div class="driver-screen">
        <header class="screen-header">
            <div class="header-main">
                <h1 class="header-title">智能调度指引</h1>
                <div class="header-subtitle">INTELLIGENT DISPATCH SYSTEM</div>
            </div>
            <div class="header-brand">
                <span class="brand-name">QBT</span>
                <span class="brand-sep">·</span>
                <span class="brand-tag">自主研发</span>
            </div>
        </header>

        <main class="screen-main" id="matchContainer">
            <div class="loading-state" id="loadingState">
                <div class="loading-ring"></div>
                <p class="loading-text">正在获取调度数据</p>
            </div>
        </main>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">⏳</div>
            <h2 class="empty-title">暂无调度任务</h2>
            <p class="empty-desc">系统正在实时监测中</p>
        </div>

        <footer class="screen-footer">
            <div class="footer-left">
                <span class="status-dot"></span>
                <span class="status-text">系统运行中</span>
            </div>
            <div class="footer-center">
                <span class="current-time" id="currentTime">--:--:--</span>
            </div>
            <div class="footer-right">
                <span class="update-info" id="updateInfo">数据更新中</span>
            </div>
        </footer>
    </div>

    <script src="/static/js/driver-display.js"></script>
</body>
</html>
