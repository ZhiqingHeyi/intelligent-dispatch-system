<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能卸料动态匹配调度中心</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-logo">DISPATCH CENTER</div>
        <div class="loading-bar">
            <div class="loading-bar-fill"></div>
        </div>
        <div class="loading-text">系统初始化中...</div>
    </div>

    <div class="dashboard">
        <!-- 顶部标题栏 - 科技大屏风格 -->
        <header class="header">
            <div class="header-scan-line"></div>
            
            <!-- 左侧装饰 -->
            <div class="header-deco-left">
                <div class="deco-line"></div>
                <div class="deco-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
            
            <!-- 中间标题区域 -->
            <div class="header-center-main">
                <div class="title-wrapper">
                    <div class="title-glow"></div>
                    <h1 class="main-title">
                        <span class="title-prefix">QBT水利枢纽工程</span>
                        <span class="title-divider">|</span>
                        <span class="title-main">智能卸料动态匹配调度中心</span>
                    </h1>
                    <div class="title-underline">
                        <div class="underline-core"></div>
                        <div class="underline-glow"></div>
                    </div>
                </div>
                <div class="subtitle-bar">
                    <span class="subtitle-text">INTELLIGENT DISPATCH CENTER</span>
                    <div class="subtitle-particles">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>
            </div>
            
            <!-- 右侧装饰和时间状态 -->
            <div class="header-deco-right">
                <div class="header-top-status">
                    <span class="sync-status" id="sync-status">● 同步中</span>
                    <span class="clock" id="clock"></span>
                </div>
                <div class="deco-dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="deco-line"></div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧：缆机面板 -->
            <section class="panel panel-left">
                <div class="panel-corner tl"></div>
                <div class="panel-corner tr"></div>
                <div class="panel-corner bl"></div>
                <div class="panel-corner br"></div>
                <div class="panel-header">
                    <h2>缆机状态</h2>
                    <span class="panel-badge" id="cable-car-count">4台</span>
                </div>
                <div class="panel-body" id="cable-car-list">
                    <!-- 动态生成 -->
                </div>
            </section>

            <!-- 中间：调度匹配区 -->
            <section class="panel panel-center">
                <div class="panel-corner tl"></div>
                <div class="panel-corner tr"></div>
                <div class="panel-corner bl"></div>
                <div class="panel-corner br"></div>
                <div class="panel-header">
                    <h2>调度匹配</h2>
                </div>
                <div class="panel-body">
                    <!-- 数据监控面板 -->
                    <div class="data-monitor-panel" id="data-monitor">
                        <div class="monitor-title">◆ 实时数据监控 ◆</div>
                        <div class="monitor-grid">
                            <div class="monitor-card">
                                <div class="monitor-icon returning">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M15 14l5-5-5-5"/>
                                        <path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5v0A5.5 5.5 0 0 0 9.5 20H13"/>
                                    </svg>
                                </div>
                                <div class="monitor-info">
                                    <span class="monitor-label">返程缆机</span>
                                    <span class="monitor-value" id="stat-returning">0</span>
                                    <span class="monitor-trend" id="trend-returning"></span>
                                </div>
                            </div>
                            <div class="monitor-card">
                                <div class="monitor-icon going">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9 14L4 9l5-5"/>
                                        <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/>
                                    </svg>
                                </div>
                                <div class="monitor-info">
                                    <span class="monitor-label">送料车辆</span>
                                    <span class="monitor-value" id="stat-going">0</span>
                                    <span class="monitor-trend" id="trend-going"></span>
                                </div>
                            </div>
                            <div class="monitor-card">
                                <div class="monitor-icon active">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/>
                                        <path d="M12 6v6l4 2"/>
                                    </svg>
                                </div>
                                <div class="monitor-info">
                                    <span class="monitor-label">进行中任务</span>
                                    <span class="monitor-value" id="stat-active">0</span>
                                    <span class="monitor-trend" id="trend-active"></span>
                                </div>
                            </div>
                            <div class="monitor-card">
                                <div class="monitor-icon completed">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                        <polyline points="22 4 12 14.01 9 11.01"/>
                                    </svg>
                                </div>
                                <div class="monitor-info">
                                    <span class="monitor-label">今日完成</span>
                                    <span class="monitor-value" id="stat-completed">0</span>
                                    <span class="monitor-trend" id="trend-completed"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 匹配操作区 -->
                    <div class="match-area" id="match-area">
                        <div class="match-hint" id="match-hint">
                            <div class="hint-icon">⬅</div>
                            <p>请先选择一台返程缆机</p>
                        </div>
                    </div>
                    <!-- 当前任务 -->
                    <div class="task-section">
                        <h3>当前任务</h3>
                        <div class="task-list" id="active-task-list">
                            <div class="empty-hint">暂无进行中的任务</div>
                        </div>
                    </div>
                    <!-- 历史记录 -->
                    <div class="task-section">
                        <h3>历史记录</h3>
                        <div class="task-list task-history" id="history-task-list">
                            <div class="empty-hint">暂无历史记录</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 右侧：车辆面板 -->
            <section class="panel panel-right">
                <div class="panel-corner tl"></div>
                <div class="panel-corner tr"></div>
                <div class="panel-corner bl"></div>
                <div class="panel-corner br"></div>
                <div class="panel-header">
                    <h2>运输车辆</h2>
                    <span class="panel-badge" id="vehicle-count">16台</span>
                </div>
                <div class="panel-body">
                    <!-- 级配筛选 -->
                    <div class="grade-filter" id="grade-filter">
                        <!-- 动态生成 -->
                    </div>
                    <!-- 车辆列表（按级配分组） -->
                    <div class="vehicle-groups" id="vehicle-groups">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 级配选择弹窗 -->
    <div class="modal-overlay" id="grade-modal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h3 id="grade-modal-title">设置级配</h3>
                <button class="modal-close" onclick="closeGradeModal()">&times;</button>
            </div>
            <div class="modal-body" id="grade-modal-body">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 缆机状态设置弹窗 -->
    <div class="modal-overlay" id="state-modal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h3 id="state-modal-title">设置缆机状态</h3>
                <button class="modal-close" onclick="closeStateModal()">&times;</button>
            </div>
            <div class="modal-body" id="state-modal-body">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
