<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能卸料动态匹配调度中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0e27;
            color: #e0e6ff;
            overflow: hidden;
            height: 100vh;
        }
        .header {
            height: 70px;
            background: linear-gradient(135deg, #0d1333 0%, #1a1f4e 100%);
            border-bottom: 2px solid #2a3a8a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        .header-title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #b3e5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
        }
        .header-time {
            font-size: 16px;
            color: #81d4fa;
        }
        .stats-bar {
            height: 60px;
            background: linear-gradient(135deg, #0f1538 0%, #151b45 100%);
            border-bottom: 1px solid #1e2a6e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #4fc3f7;
        }
        .stat-label {
            font-size: 13px;
            color: #8892b0;
        }
        .main-content {
            display: flex;
            height: calc(100vh - 130px);
            padding: 12px;
            gap: 12px;
        }
        .panel {
            background: linear-gradient(180deg, #0f1538 0%, #0d1230 100%);
            border: 1px solid #1e2a6e;
            border-radius: 8px;
            overflow: hidden;
        }
        .panel-header {
            height: 40px;
            background: linear-gradient(90deg, #1a237e 0%, transparent 100%);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 15px;
            font-weight: bold;
            color: #82b1ff;
            border-bottom: 1px solid #1e2a6e;
        }
        .panel-header::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #4fc3f7;
            margin-right: 10px;
            border-radius: 2px;
        }
        .left-panel { width: 320px; display: flex; flex-direction: column; gap: 12px; }
        .center-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .right-panel { width: 380px; display: flex; flex-direction: column; gap: 12px; }

        .cable-car-card {
            background: linear-gradient(135deg, #141938 0%, #0f1330 100%);
            border: 1px solid #1e2a6e;
            border-radius: 6px;
            padding: 12px;
            margin: 8px;
            transition: all 0.3s;
        }
        .cable-car-card.returning {
            border-color: #4caf50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
        }
        .cable-car-card.matched {
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);
        }
        .cc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .cc-id {
            font-size: 16px;
            font-weight: bold;
            color: #4fc3f7;
        }
        .cc-direction {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .dir-return { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; }
        .dir-go { background: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }
        .dir-stop { background: rgba(158, 158, 158, 0.2); color: #9e9e9e; border: 1px solid #9e9e9e; }
        .dir-adjust { background: rgba(255, 152, 0, 0.2); color: #ff9800; border: 1px solid #ff9800; }
        .cc-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            font-size: 12px;
            color: #8892b0;
        }
        .cc-info span { color: #b0bec5; }
        .grade-select {
            width: 100%;
            margin-top: 8px;
            padding: 6px 10px;
            background: #1a1f4e;
            border: 1px solid #2a3a8a;
            border-radius: 4px;
            color: #e0e6ff;
            font-size: 13px;
            cursor: pointer;
        }
        .grade-select:focus { outline: none; border-color: #4fc3f7; }

        .vehicle-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }
        .vehicle-list::-webkit-scrollbar { width: 4px; }
        .vehicle-list::-webkit-scrollbar-thumb { background: #2a3a8a; border-radius: 2px; }
        .vehicle-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            margin-bottom: 4px;
            background: #141938;
            border: 1px solid #1e2a6e;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.3s;
        }
        .vehicle-item.going { border-left: 3px solid #f44336; }
        .vehicle-item.returning { border-left: 3px solid #4caf50; }
        .vehicle-item.matched { border-left: 3px solid #ff9800; background: rgba(255, 152, 0, 0.05); }
        .vehicle-item.stopped { border-left: 3px solid #9e9e9e; }
        .vi-id { width: 50px; font-weight: bold; color: #4fc3f7; }
        .vi-direction { width: 70px; }
        .vi-grade { flex: 1; }
        .vi-status { width: 60px; text-align: right; }

        .match-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .match-result {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .match-card {
            background: linear-gradient(135deg, #1a237e 0%, #0d1333 100%);
            border: 1px solid #3f51b5;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .match-title {
            font-size: 16px;
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 10px;
        }
        .match-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .match-vehicle, .match-cable-car {
            text-align: center;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }
        .match-arrow {
            font-size: 24px;
            color: #4caf50;
        }
        .match-grade {
            text-align: center;
            margin: 8px 0;
            padding: 4px 16px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            border-radius: 12px;
            display: inline-block;
            font-size: 13px;
            color: #4caf50;
        }
        .match-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }
        .btn {
            padding: 6px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary { background: #4caf50; color: white; }
        .btn-primary:hover { background: #45a049; }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover { background: #d32f2f; }
        .btn-info { background: #2196f3; color: white; }
        .btn-info:hover { background: #1976d2; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #f57c00; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }

        .task-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin: 4px 8px;
            background: #141938;
            border-radius: 4px;
            font-size: 12px;
            gap: 10px;
        }
        .task-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        .status-pending { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
        .status-completed { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-cancelled { background: rgba(244, 67, 54, 0.2); color: #f44336; }

        .map-container {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, #141938 0%, #0a0e27 100%);
            border: 1px solid #1e2a6e;
            border-radius: 8px;
            overflow: hidden;
        }
        .map-canvas {
            width: 100%;
            height: 100%;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        .legend {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(15, 21, 56, 0.9);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .auto-match-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">智能卸料动态匹配调度中心</div>
        <div class="header-time" id="currentTime"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="statReturning">0</div>
            <div class="stat-label">返程缆机</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statGoing">0</div>
            <div class="stat-label">送料车辆</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statPending">0</div>
            <div class="stat-label">待执行任务</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statCompleted">0</div>
            <div class="stat-label">已完成任务</div>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="panel" style="flex:1;">
                <div class="panel-header">缆机状态监控</div>
                <div id="cableCarList" style="overflow-y:auto; max-height: calc(100% - 40px);"></div>
            </div>
        </div>

        <div class="center-panel">
            <div class="panel map-container" style="flex:1;">
                <div class="panel-header" style="position:absolute;top:0;left:0;right:0;z-index:5;">
                    实时态势图
                </div>
                <canvas id="mapCanvas" class="map-canvas"></canvas>
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#4caf50;"></div> 返程缆机</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#f44336;"></div> 送料车辆</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ff9800;"></div> 已匹配</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#9e9e9e;"></div> 停止</div>
                </div>
                <button class="btn btn-info auto-match-btn" onclick="autoMatch()">智能匹配</button>
            </div>

            <div class="panel" style="height: 220px;">
                <div class="panel-header">调度任务列表</div>
                <div class="task-list" id="taskList"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel" style="flex:1;">
                <div class="panel-header">车辆状态监控</div>
                <div class="vehicle-list" id="vehicleList"></div>
            </div>

            <div class="panel match-panel" style="height: 280px;">
                <div class="panel-header">匹配推荐</div>
                <div class="match-result" id="matchResult">
                    <div style="text-align:center; padding:30px; color:#5a6488;">
                        点击"智能匹配"按钮<br>自动匹配返程缆机与送料车辆
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        const GRADES = ['二级配', '三级配', '四级配', '三级配PVA纤维', '三级富浆'];

        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }
        setInterval(updateTime, 1000);
        updateTime();

        async function fetchAPI(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API + url, opts);
            return res.json();
        }

        async function loadData() {
            try {
                const [cableCars, vehicles, tasks, stats] = await Promise.all([
                    fetchAPI('/api/cable_cars'),
                    fetchAPI('/api/vehicles'),
                    fetchAPI('/api/tasks'),
                    fetchAPI('/api/stats')
                ]);
                renderCableCars(cableCars);
                renderVehicles(vehicles);
                renderTasks(tasks);
                renderStats(stats);
                drawMap(cableCars, vehicles);
            } catch (e) {
                console.error('加载数据失败:', e);
            }
        }

        function renderCableCars(cars) {
            const el = document.getElementById('cableCarList');
            el.innerHTML = cars.map(car => {
                const dirClass = car.direction.includes('返程') ? 'returning' :
                                 car.direction.includes('往程') ? '' :
                                 car.status === '已匹配' ? 'matched' : '';
                const dirBadge = car.direction.includes('返程') ? 'dir-return' :
                                 car.direction.includes('往程') ? 'dir-go' :
                                 car.direction.includes('停止') ? 'dir-stop' : 'dir-adjust';
                return `<div class="cable-car-card ${dirClass}">
                    <div class="cc-header">
                        <span class="cc-id">${car.cable_car_id}号缆机</span>
                        <span class="cc-direction ${dirBadge}">${car.direction}</span>
                    </div>
                    <div class="cc-info">
                        <div>纬度: <span>${car.latitude ? car.latitude.toFixed(1) : '-'}</span></div>
                        <div>经度: <span>${car.longitude ? car.longitude.toFixed(1) : '-'}</span></div>
                        <div>X速度: <span>${car.xspeed ? car.xspeed.toFixed(2) : '0'}</span></div>
                        <div>状态: <span>${car.status}</span></div>
                    </div>
                    <select class="grade-select" onchange="setCableCarGrade(${car.cable_car_id}, this.value)">
                        <option value="">-- 选择级配 --</option>
                        ${GRADES.map(g => `<option value="${g}" ${car.grade === g ? 'selected' : ''}>${g}</option>`).join('')}
                    </select>
                </div>`;
            }).join('');
        }

        function renderVehicles(vehicles) {
            const el = document.getElementById('vehicleList');
            el.innerHTML = vehicles.map(v => {
                const cls = v.status === '已匹配' ? 'matched' :
                            v.direction.includes('往程') ? 'going' :
                            v.direction.includes('返程') ? 'returning' : 'stopped';
                return `<div class="vehicle-item ${cls}">
                    <div class="vi-id">${v.user_name || v.tid + '#'}</div>
                    <div class="vi-direction">${v.direction}</div>
                    <div class="vi-grade">
                        <select class="grade-select" style="padding:2px 6px;font-size:11px;" onchange="setVehicleGrade(${v.tid}, this.value)">
                            <option value="">级配</option>
                            ${GRADES.map(g => `<option value="${g}" ${v.grade === g ? 'selected' : ''}>${g}</option>`).join('')}
                        </select>
                    </div>
                    <div class="vi-status">${v.status}</div>
                </div>`;
            }).join('');
        }

        function renderTasks(tasks) {
            const el = document.getElementById('taskList');
            if (!tasks.length) {
                el.innerHTML = '<div style="text-align:center;padding:20px;color:#5a6488;">暂无调度任务</div>';
                return;
            }
            el.innerHTML = tasks.slice(0, 10).map(t => {
                const statusCls = t.status === '待执行' ? 'status-pending' :
                                  t.status === '已完成' ? 'status-completed' : 'status-cancelled';
                return `<div class="task-item">
                    <span>${t.vehicle_name || t.vehicle_tid + '#车'}</span>
                    <span style="color:#4fc3f7;">→</span>
                    <span>${t.cable_car_id}号缆机</span>
                    <span style="color:#4caf50;">[${t.grade}]</span>
                    <span class="task-status ${statusCls}">${t.status}</span>
                    ${t.status === '待执行' ? `<button class="btn btn-primary btn-sm" onclick="completeTask(${t.id})">完成</button>
                    <button class="btn btn-danger btn-sm" onclick="cancelTask(${t.id})">取消</button>` : ''}
                </div>`;
            }).join('');
        }

        function renderStats(stats) {
            document.getElementById('statReturning').textContent = stats.returning_cars || 0;
            document.getElementById('statGoing').textContent = stats.going_vehicles || 0;
            document.getElementById('statPending').textContent = stats.pending_tasks || 0;
            document.getElementById('statCompleted').textContent = stats.completed_tasks || 0;
        }

        async function setCableCarGrade(id, grade) {
            await fetchAPI(`/api/cable_car/${id}/grade`, 'POST', { grade });
            loadData();
        }

        async function setVehicleGrade(tid, grade) {
            await fetchAPI(`/api/vehicle/${tid}/grade`, 'POST', { grade });
            loadData();
        }

        async function autoMatch() {
            const result = await fetchAPI('/api/match');
            const el = document.getElementById('matchResult');
            if (!result.matches || !result.matches.length) {
                el.innerHTML = '<div style="text-align:center;padding:20px;color:#ff9800;">未找到匹配的缆机-车辆对<br>请确保缆机设置了级配且有对应级配的送料车辆</div>';
                return;
            }
            el.innerHTML = result.matches.map(m => `
                <div class="match-card">
                    <div class="match-title">匹配推荐</div>
                    <div class="match-detail">
                        <div class="match-vehicle">
                            <div style="font-size:20px;font-weight:bold;color:#f44336;">${m.vehicle_name || m.vehicle_tid + '#车'}</div>
                            <div style="font-size:12px;color:#8892b0;">送料车辆</div>
                        </div>
                        <div class="match-arrow">→</div>
                        <div class="match-cable-car">
                            <div style="font-size:20px;font-weight:bold;color:#4caf50;">${m.cable_car_id}号缆机</div>
                            <div style="font-size:12px;color:#8892b0;">返程缆机</div>
                        </div>
                    </div>
                    <div style="text-align:center;margin-top:8px;">
                        <span class="match-grade">${m.grade}</span>
                    </div>
                    <div class="match-actions">
                        <button class="btn btn-primary" onclick="confirmMatch(${m.cable_car_id}, ${m.vehicle_tid}, '${m.grade}')">确认匹配</button>
                    </div>
                </div>
            `).join('');
        }

        async function confirmMatch(cableCarId, vehicleTid, grade) {
            await fetchAPI('/api/dispatch', 'POST', { cable_car_id: cableCarId, vehicle_tid: vehicleTid, grade });
            loadData();
            autoMatch();
        }

        async function completeTask(taskId) {
            await fetchAPI(`/api/dispatch/${taskId}/complete`, 'POST');
            loadData();
        }

        async function cancelTask(taskId) {
            await fetchAPI(`/api/dispatch/${taskId}/cancel`, 'POST');
            loadData();
        }

        function drawMap(cableCars, vehicles) {
            const canvas = document.getElementById('mapCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.strokeStyle = '#1e2a6e';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 4]);
            ctx.beginPath();
            ctx.moveTo(cx - 200, cy);
            ctx.lineTo(cx + 200, cy);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#2a3a8a';
            ctx.font = '12px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('装料平台', cx - 180, cy - 15);
            ctx.fillText('卸料平台', cx + 180, cy - 15);

            cableCars.forEach((car, i) => {
                const x = cx + 120 + (i % 2) * 80;
                const y = cy - 40 + Math.floor(i / 2) * 80;
                const color = car.direction.includes('返程') ? '#4caf50' :
                              car.direction.includes('往程') ? '#f44336' :
                              car.status === '已匹配' ? '#ff9800' : '#9e9e9e';

                ctx.beginPath();
                ctx.arc(x, y, 18, 0, Math.PI * 2);
                ctx.fillStyle = color + '33';
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#e0e6ff';
                ctx.font = 'bold 12px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText(car.cable_car_id + '号', x, y + 4);

                if (car.grade) {
                    ctx.fillStyle = '#4caf50';
                    ctx.font = '10px Microsoft YaHei';
                    ctx.fillText(car.grade, x, y + 32);
                }
            });

            vehicles.forEach((v, i) => {
                const col = i % 4;
                const row = Math.floor(i / 4);
                const x = cx - 200 + col * 60;
                const y = cy + 60 + row * 40;
                const color = v.status === '已匹配' ? '#ff9800' :
                              v.direction.includes('往程') ? '#f44336' :
                              v.direction.includes('返程') ? '#4caf50' : '#9e9e9e';

                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.fillStyle = color + '33';
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = '#b0bec5';
                ctx.font = '9px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText(v.tid + '#', x, y + 3);
            });
        }

        loadData();
        setInterval(loadData, 3000);
